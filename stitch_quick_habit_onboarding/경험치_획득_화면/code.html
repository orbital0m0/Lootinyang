<!DOCTYPE html>
<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Noto+Sans+KR:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3182f6","toss-pink": "#f24d88",
                        "toss-bg": "#ffffff",
                        "toss-gray": "#f2f4f6",
                        "toss-text-main": "#191f28",
                        "toss-text-sub": "#4e5968",
                        "toss-text-light": "#8b95a1"
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "Noto Sans KR", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        @keyframes soft-glow {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(49, 130, 246, 0.2)); }
            50% { filter: drop-shadow(0 0 30px rgba(49, 130, 246, 0.5)); }
        }
        .animate-float-glow {
            animation: float 3s ease-in-out infinite, soft-glow 3s ease-in-out infinite;
        }
        body {
            font-family: 'Noto Sans KR', 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-toss-bg min-h-screen flex flex-col">
<div class="flex items-center px-5 py-4 justify-between sticky top-0 z-10 bg-white/80 backdrop-blur-md">
<button class="text-toss-text-main">
<span class="material-symbols-outlined font-light">close</span>
</button>
</div>
<div class="flex-1 flex flex-col items-center justify-center px-6">
<div class="relative flex flex-col items-center justify-center mb-16">
<div class="absolute w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute w-48 h-48 bg-toss-pink/5 rounded-full blur-2xl"></div>
<div class="relative animate-float-glow flex flex-col items-center">
<span class="text-primary text-[56px] font-bold tracking-tight mb-2">+10 EXP</span>
<div class="flex items-center gap-1.5 bg-toss-gray px-4 py-1.5 rounded-full">
<span class="material-symbols-outlined text-primary text-[18px]" style="font-variation-settings: 'FILL' 1">stars</span>
<span class="text-toss-text-sub font-semibold text-sm">습관 달성 완료</span>
</div>
</div>
</div>
<div class="w-full max-w-sm">
<div class="flex flex-col gap-6">
<div class="flex justify-between items-end">
<div class="flex flex-col gap-1">
<span class="text-toss-text-light text-sm font-medium">현재 레벨</span>
<p class="text-toss-text-main text-2xl font-bold">Level 12</p>
</div>
<div class="text-right">
<span class="text-primary font-bold text-lg">120</span>
<span class="text-toss-text-light font-medium text-lg"> / 200</span>
</div>
</div>
<div class="relative h-4 w-full bg-toss-gray rounded-full overflow-hidden">
<div class="absolute top-0 left-0 h-full bg-primary rounded-full transition-all duration-1000" style="width: 60%;"></div>
</div>
<div class="flex items-center justify-center gap-2 py-4 px-5 bg-toss-gray/50 rounded-2xl">
<span class="material-symbols-outlined text-toss-pink text-[20px]" style="font-variation-settings: 'FILL' 1">redeem</span>
<p class="text-toss-text-sub text-[15px] font-medium">
                        다음 상자까지 <span class="text-toss-text-main font-bold">80 EXP</span> 남았어요!
                    </p>
</div>
</div>
</div>
</div>
<div class="p-6 pb-10">
<button class="w-full bg-primary text-white font-bold py-5 rounded-2xl text-[17px] active:scale-[0.98] transition-all shadow-sm">
            확인
        </button>
</div>

</body></html>
